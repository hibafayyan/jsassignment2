<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chapters</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .btn-custom {
      position: relative;
      display: inline-block;
      text-decoration: none;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      transition: filter 250ms;
    }

    .shadow {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.25);
      transform: translateY(2px);
      transition: transform 600ms cubic-bezier(.3,.7,.4,1);
    }

    .edge {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      background: linear-gradient(
        to left,
        hsl(340deg 100% 16%) 0%,
        hsl(340deg 100% 32%) 8%,
        hsl(340deg 100% 32%) 92%,
        hsl(340deg 100% 16%) 100%
      );
    }

    .front {
      position: relative;
      display: block;
      padding: 14px 30px;
      border-radius: 12px;
      font-size: 1.1rem;
      color: white;
      background: hsl(345deg 100% 47%);
      transform: translateY(-4px);
      transition: transform 600ms cubic-bezier(.3,.7,.4,1);
    }

    .btn-custom:hover {
      filter: brightness(110%);
    }

    .btn-custom:hover .front {
      transform: translateY(-6px);
      transition: transform 250ms cubic-bezier(.3,.7,.4,1.5);
    }

    .btn-custom:active .front {
      transform: translateY(-2px);
      transition: transform 34ms;
    }

    .btn-custom:hover .shadow {
      transform: translateY(4px);
      transition: transform 250ms cubic-bezier(.3,.7,.4,1.5);
    }

    .btn-custom:active .shadow {
      transform: translateY(1px);
      transition: transform 34ms;
    }

    h1 {
      font-weight: 700;
      margin-bottom: 40px;
    }
  </style>
</head>

<body>

<div class="container text-center">
  <h1>📚 My Chapters</h1>

  <div class="row g-4 justify-content-center">

    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
      <a href="./chapno1/index.html" class="btn-custom">
        <span class="shadow"></span>
        <span class="edge"></span>
        <span class="front">Chapter 1</span>
      </a>
    </div>

    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
      <a href="./chapno2/index.html" class="btn-custom">
        <span class="shadow"></span>
        <span class="edge"></span>
        <span class="front">Chapter 2</span>
      </a>
    </div>

    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
      <a href="./chapno3/index.html" class="btn-custom">
        <span class="shadow"></span>
        <span class="edge"></span>
        <span class="front">Chapter 3</span>
      </a>
    </div>

    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
      <a href="./chapno4/index.html" class="btn-custom">
        <span class="shadow"></span>
        <span class="edge"></span>
        <span class="front">Chapter 4</span>
      </a>
    </div>

    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
      <a href="./chapno5/index.html" class="btn-custom">
        <span class="shadow"></span>
        <span class="edge"></span>
        <span class="front">Chapter 5</span>
      </a>
    </div>

  </div>
</div>

</body>
</html>
